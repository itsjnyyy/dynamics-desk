<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Contact</title>
  <style>
    :root {
      --bg:#3c3f46; --bg2:#45484f; --bg3:#4f535b;
      --accent:#6cc0f5; --text:#f1f3f6; --muted:#9aa0ab; --muted2:#c4c9d2;
      --border:#5b5f68; --danger:#ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; display: flex; flex-direction: column; }

    #titlebar { height: 42px; display: flex; align-items: center; padding: 0 0 0 16px; gap: 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg2); -webkit-app-region: drag; }
    #win-controls { display: flex; height: 100%; align-self: stretch; -webkit-app-region: no-drag; }
    .wc-btn { width: 46px; height: 100%; border-radius: 0; border: none; background: transparent; color: var(--muted2); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background .12s, color .12s; }
    .wc-btn svg { width: 10px; height: 10px; }
    .wc-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }
    .wc-close:hover { background: #e81123; color: #fff; }
    #titlebar-label { font-size: 13px; font-weight: 600; color: var(--muted2); flex: 1; text-align: center; pointer-events: none; }
    #header-actions { display: flex; gap: 8px; -webkit-app-region: no-drag; }

    .btn { padding: 6px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s; font-family: inherit; }
    .btn:hover { opacity: .85; }
    .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    #main-area { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #c-loading { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted2); }
    #c-content { flex: 1; min-height: 0; display: none; flex-direction: column; overflow-y: auto; padding: 24px; gap: 16px; }

    #c-header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
    #c-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #4a9ddb); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #fff; flex-shrink: 0; }
    #c-name { font-size: 19px; font-weight: 700; }
    #c-title { font-size: 13px; color: var(--muted2); margin-top: 2px; }

    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 14px; }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field-item { display: flex; flex-direction: column; gap: 5px; }
    .field-item.span-2 { grid-column: 1 / -1; }
    .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; color: var(--muted); }
    .field-value { font-size: 13px; color: var(--text); min-height: 20px; }
    .field-value.dim { color: var(--muted2); }
    .field-value.link { color: var(--accent); cursor: pointer; }
    .field-value.link:hover { text-decoration: underline; }

    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>


<div id="titlebar">
  <span id="titlebar-label">Contact</span>
  <div id="header-actions">
    <button class="btn btn-ghost btn-sm" id="open-dynamics-btn" style="color:var(--accent);">↗ Open in Dynamics</button>
  </div>
  <div id="win-controls">
    <button class="wc-btn wc-min"   onclick="api.minimize()"><svg viewBox="0 0 10 10"><path d="M1 5h8" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg></button>
    <button class="wc-btn wc-max"   onclick="api.maximize()"><svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" stroke="currentColor" stroke-width="1" fill="none"/></svg></button>
    <button class="wc-btn wc-close" onclick="api.close()"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg></button>
  </div>
</div>

<div id="main-area">
  <div id="c-loading">
    <div class="spinner"></div>
    <span>Loading…</span>
  </div>

  <div id="c-content">
    <div id="c-header">
      <div id="c-avatar">—</div>
      <div>
        <div id="c-name">—</div>
        <div id="c-title"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Contact Info</div>
      <div class="field-grid">
        <div class="field-item">
          <span class="field-label">Phone</span>
          <span class="field-value" id="c-phone">—</span>
        </div>
        <div class="field-item">
          <span class="field-label">Mobile</span>
          <span class="field-value" id="c-mobile">—</span>
        </div>
        <div class="field-item span-2">
          <span class="field-label">Email</span>
          <span class="field-value" id="c-email">—</span>
        </div>
        <div class="field-item span-2">
          <span class="field-label">Account</span>
          <span class="field-value dim" id="c-account">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="contact.js"></script>
</body>
</html>
